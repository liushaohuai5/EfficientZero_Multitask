# agent
agent_name: humanoid_bench_state_agent

# env setting
env:
  env: Humanoid_Bench
  game: h1-stand
  difficulty: hard    # medium, hard
  multi_task: False
  base_seed: 0
  n_skip: 1
  n_stack: 1
  max_episode_steps: 500
  gray_scale: False
  image_based: False
  continuous_action: True
  clip_reward: False
  obs_shape: 10
  episodic: False

rl:
  discount: 0.99 # prev 0.99
  unroll_steps: 5   # prev 5
  td_steps: 5 # prev 5
  auto_td_steps: 3e5  # prev 30000 for 100k env steps
  td_lambda: 0.95

# optimizer
optimizer:
  type: Adam
  lr: 1e-4
  lr_warm_up: 0.0
  lr_decay_type: none
  lr_decay_rate: 0.1
  lr_decay_steps: 1e6
  weight_decay: 2e-5
  momentum: 0.9

# priority of data
priority:
  use_priority: True
  priority_prob_alpha: 1.0    # prev 0.6
  priority_prob_beta: 1.0     # prev 0.4
  min_prior: 0.000001

# training
train:
  load_model_path: ''
#  load_model_path: '/workspace/EZ-Codebase/results/Humanoid_Bench/h1-walk-v0/EZ-V2-seed=0-2024-06-24 17:25:02/models/model_190000.p'
  batch_size: 256     # 256 for single-task, 512 for multi-task training
  training_steps: 2e5        # 200 * 1000
  offline_training_steps: 2e4     # 20 * 1000
  start_transitions: 2000       # 2 * 1000

  eval_n_episode: 5          # prev 10
  eval_interval: 5000

  self_play_update_interval: 5   # prev 100
  reanalyze_update_interval: 5   # prev 200, 1 for use EMA update
  save_ckpt_interval: 10000

  mini_batch_size: 256 # prev 256
  reanalyze_ratio: 1.0

  reward_loss_coeff: 1.0
  value_loss_coeff: 0.5      # prev 0.25
  policy_loss_coeff: 1.0
  consistency_coeff: 5.0
  decorrelation_coeff: 0.01
  off_diag_coeff: 5e-3
  entropy_coeff: 1e-4 # prev 5e-3

  max_grad_norm: 10
  change_temperature: True

  use_policy_gradient: False
  periodic_reset: False
  value_reanalyze: False
  path_consistency: True
  use_decorrelation: False
  value_policy_detach: False
  optimal_Q: False
  v_num: 5
  value_target: 'mixed'   # sarsa or search or mixed or max
  mixed_type: rule  # rule or variance
  use_IQL: False
  IQL_weight: 0.7
  start_use_mix_training_steps: 5e4   # prev 4e4
  mixed_value_threshold: 2e5  # prev 2e4

# self-play data collection
data:
  num_envs: 12  # 36 for medium, 56 for hard
  buffer_size: 9e6        # same as total transitions
  total_transitions: 9e6   # 2M for with h1hand-*, 1M for h1-*
  top_transitions: 9e6
  trajectory_size: 100        # prev 500
  save_video: False
  save_as_dataset: False

# MCTS
mcts:
  language: cython
  num_simulations: 32         # GRPO if equal to num_top_actions
  num_top_actions: 16          # prev 4
  num_sampled_actions: 16      # same as Sampled MuZero
  c_visit: 50.0
  c_scale: 0.1    # prev 0.1
  value_minmax_delta: 0.01
  mpc_horizon: 1
  vis: ['print']
  use_mppi: False
  std_magnification: 3
  search_type: lsh  # lsh or ywr

# model architecture
model:
  action_embedding: True     # Prev True
  use_sem: False
  sem:
    V: 8
  block_type: resnet          # resnet, convnext
  down_sample: True
  state_norm: False
  value_prefix: False
  value_target: bootstrapped  # bootstrapped or GAE
  GAE_max_steps: 15           # 10 or 15 or 20
  dynamic_type: None          # RNN or Transformer or None
  init_zero: True
  use_bn: True
  use_p_norm: False
  num_blocks: 3 # prev 3
  reward_parallel: True

  hidden_shape: 512   # prev 128
  task_embedding_shape: 128
  rep_net_shape: 512
  dyn_shape: 512
  act_embed_shape: 64
  rew_net_shape: [ 512, 512 ]
  val_net_shape: [ 512, 512 ]
  pi_net_shape: [ 512, 512 ]
  proj_hid_shape: 1024
  pred_hid_shape: 1024
  proj_shape: 512
  pred_shape: 512
#  hidden_shape: 128   # prev 128
#  task_embedding_shape: 32
#  rep_net_shape: 256
#  dyn_shape: 256
#  act_embed_shape: 32
#  rew_net_shape: [ 256, 256 ]
#  val_net_shape: [ 256, 256 ]
#  pi_net_shape: [ 256, 256 ]
#  proj_hid_shape: 512
#  pred_hid_shape: 512
#  proj_shape: 128
#  pred_shape: 128

  fc_layers: [32]
  lstm_hidden_size: 512
  lstm_horizon_len: 5

  policy_distribution: tdmpc2  # beta or squashed_gaussian or truncated_gaussian or tdmpc2
  policy_loss_type: reanalyze  # policy_gradient or reanalyze
  policy_action_num: 4
  random_action_num: 12
  random_type: std   # std, normal, pink, OU

  reward_support:
    range: [ -299, 299 ]
    scale: 0.01
    env: Humanoid_Bench
    continuous_action: True
    bins: 51
    type: support   # support or symlog
  value_support:
    range: [ -299, 299 ]
    scale: 0.5
    env: Humanoid_Bench
    continuous_action: True
    bins: 51
    type: support   # support or symlog

# worker process allocation
actors:
  data_worker: 12  # 4
  batch_worker: 8 # 8


# wandb
wandb:
#  project: 'ez-v2-humanoid_bench'
  project: 'ez-v3-humanoidbench'
  tag: 'state-MT-m16-n32-s16-T500k-2Mdata-block3-top1M-alpha1.0-beta1.0'
