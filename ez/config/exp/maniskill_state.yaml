# agent
agent_name: maniskill_state_agent

# env setting
env:
  env: ManiSkill
  game: PickCube
  difficulty: medium
  multi_task: True
  base_seed: 0
  n_skip: 2
  n_stack: 1
  max_episode_steps: 500
  gray_scale: False
  image_based: False
  continuous_action: True
  clip_reward: False
  obs_shape: 10
  episodic: False

rl:
  discount: 0.95 # prev 0.99
  unroll_steps: 5   # prev 5
  td_steps: 5 # prev 5
  auto_td_steps: 3e5  # prev 30000 for 100k env steps
  td_lambda: 0.95

# optimizer
optimizer:
  type: Adam
  lr: 1e-4
  lr_warm_up: 0.0
  lr_decay_type: none
  lr_decay_rate: 0.1
  lr_decay_steps: 1e6
  weight_decay: 2e-5
  momentum: 0.9

# priority of data
priority:
  use_priority: True
  priority_prob_alpha: 1.0    # prev 0.6
  priority_prob_beta: 1.0     # prev 0.4
  min_prior: 0.000001

# training
train:
  load_model_path: ''
  batch_size: 512
  training_steps: 200000        # 100 * 1000
  offline_training_steps: 20000     # 20 * 1000
  start_transitions: 200       # 2 * 1000

  eval_n_episode: 5          # prev 10
  eval_interval: 5000

  self_play_update_interval: 5   # prev 100
  reanalyze_update_interval: 5   # prev 200
  save_ckpt_interval: 10000

  mini_batch_size: 256
  reanalyze_ratio: 1.0

  reward_loss_coeff: 1.0
  value_loss_coeff: 0.5      # prev 0.25
  policy_loss_coeff: 1.0
  consistency_coeff: 5.0
  decorrelation_coeff: 0.01
  off_diag_coeff: 5e-3
  entropy_coeff: 5e-3 # prev 5e-3

  max_grad_norm: 5
  change_temperature: True

  use_policy_gradient: False
  periodic_reset: False
  value_reanalyze: False
  path_consistency: True
  use_decorrelation: False
  value_policy_detach: False
  optimal_Q: False
  v_num: 5
  value_target: 'mixed'   # sarsa or search or mixed or max
  mixed_type: rule  # rule or variance
  use_IQL: False
  IQL_weight: 0.7
  start_use_mix_training_steps: 4e4   # prev 4e4
  mixed_value_threshold: 2e4  # prev 2e4
  calc_grad_sim: False

# self-play data collection
data:
  num_envs: 4
  buffer_size: 500000        # 1 * 1000 * 1000
  total_transitions: 500000  # 1M
  top_transitions: 5e5
  trajectory_size: 15        # prev 500
  save_video: False
  save_as_dataset: False
  ind_exp_rp: True

# MCTS
mcts:
  language: cython
  num_simulations: 16         # GRPO if equal to num_top_actions
  num_top_actions: 8          # prev 4
  num_sampled_actions: 8      # same as Sampled MuZero
  c_visit: 50.0
  c_scale: 0.1    # prev 0.1
  value_minmax_delta: 0.01
  mpc_horizon: 1
  vis: ['print']
  use_mppi: False
  std_magnification: 3
  search_type: lsh  # lsh or ywr

# model architecture
model:
  action_embedding: True # Prev True
  use_sem: False
  sem:
    V: 8
  block_type: resnet          # resnet, convnext
  down_sample: True
  state_norm: False
  value_prefix: False
  value_target: bootstrapped  # bootstrapped or GAE
  GAE_max_steps: 15           # 10 or 15 or 20
  dynamic_type: None          # RNN or Transformer or None
  init_zero: True
  use_bn: True
  use_p_norm: False
  num_blocks: 3 # prev 3
  reward_parallel: True

  hidden_shape: 512   # prev 128
  task_embedding_shape: 128
  task_embedding_choice: [
    True, # Representation
    True, # Dynamics
    True, # Reward
    True, # Policy/Value
  ]
  rep_net_shape: 512
  dyn_shape: 512
  act_embed_shape: 64
  rew_net_shape: [ 512, 512 ]
  val_net_shape: [ 512, 512 ]
  pi_net_shape: [ 512, 512 ]
  proj_hid_shape: 1024
  pred_hid_shape: 1024
  proj_shape: 512
  pred_shape: 512

  fc_layers: [32]
  lstm_hidden_size: 512
  lstm_horizon_len: 5

  policy_distribution: tdmpc2  # tdmpc2 or squashed_gaussian
  policy_loss_type: reanalyze  # policy_gradient or reanalyze
  policy_action_num: 4
  random_action_num: 4
  random_type: std   # std, normal, pink, OU

  reward_support:
    range: [ -299, 299 ]
    scale: 0.01
    env: ManiSkill
    continuous_action: True
    bins: 51
    type: support   # support or symlog
  value_support:
    range: [ -299, 299 ]
    scale: 0.5
    env: ManiSkill
    continuous_action: True
    bins: 51
    type: support   # support or symlog

# worker process allocation
actors:
  data_worker: 1
  batch_worker: 8

# wandb
wandb:
  project: 'ez-v3-maniskill'
  tag: 'ManiSkill-state'
